name: s3_browser_crossplat
description: Cross-platform S3 browser with pluggable backend engines.
publish_to: "none"
# The release workflow reads this version when publishing GitHub Releases.
version: 2.0.12+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  desktop_drop: ^0.6.0
  file_picker: ^8.0.0+1
  flutter_secure_storage: ^9.2.2
  google_fonts: ^6.2.1
  path_provider: ^2.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.2

flutter:
  uses-material-design: true
